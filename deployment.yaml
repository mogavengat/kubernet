apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab-app
  template:
    metadata:
      labels:
        app: lab-app
    spec:
      containers:
      - name: lab-app
        image: kayalvengat/lab-app:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lab-service
spec:
  type: NodePort
  selector:
    app: lab-app
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007